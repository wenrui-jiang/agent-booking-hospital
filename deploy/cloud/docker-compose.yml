x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8.0
    container_name: yygh-mysql
    restart: unless-stopped
    logging: *default-logging
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - yygh_mysql:/var/lib/mysql

  redis:
    image: redis:7
    container_name: yygh-redis
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - yygh_redis:/data

  mongo:
    image: mongo:6
    container_name: yygh-mongo
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - yygh_mongo:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: yygh-rabbitmq
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - yygh_rabbitmq:/var/lib/rabbitmq

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: yygh-nacos
    restart: unless-stopped
    logging: *default-logging
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "127.0.0.1:8848:8848"
      - "127.0.0.1:9848:9848"

volumes:
  yygh_mysql:
  yygh_redis:
  yygh_mongo:
  yygh_rabbitmq:
